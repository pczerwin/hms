
# -------------------------------------------------
# Server / application-wide configuration
# -------------------------------------------------
server:
  port: 8080

spring:
  application:
    name: hygiene-app

  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

  # -----------------------------
  # JPA / Hibernate (shared rules)
  # -----------------------------
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  # -----------------------------
  # Flyway database migrations
  # -----------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # -----------------------------
  # Jackson timezone config
  # -----------------------------
  jackson:
    time-zone: UTC
    datatype:
      datetime:
        write-dates-as-timestamps: false

# -------------------------------------------------
# Logging (safe defaults)
# -------------------------------------------------
logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
