
# -------------------------------------------------
# Server configuration
# -------------------------------------------------
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# -------------------------------------------------
# Spring configuration
# -------------------------------------------------
spring:

  # -----------------------------
  # Datasource (MySQL)
  # -----------------------------
  datasource:
    url: >
      jdbc:mysql://localhost:3306/hygiene_app
      ?useSSL=false
      &serverTimezone=UTC
      &useUnicode=true
      &characterEncoding=UTF-8
    username: root
    password: asdasdasd
    driver-class-name: com.mysql.cj.jdbc.Driver

  # -----------------------------
  # JPA / Hibernate
  # -----------------------------
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
          use_streams_for_binary: false
        connection:
          characterEncoding: UTF-8
          CharSet: UTF-8
          useUnicode: true

  # -----------------------------
  # Flyway database migrations
  # -----------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

# -------------------------------------------------
# Logging configuration
# -------------------------------------------------
logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
