
spring:
  config:
    activate:
      on-profile: prod

  # -----------------------------
  # Datasource (production)
  # -----------------------------
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # -----------------------------
  # JPA / Hibernate (safe defaults)
  # -----------------------------
  jpa:
    show-sql: false

  flyway:
    validate-on-migrate: true

# -------------------------------------------------
# Logging (quiet, safe)
# -------------------------------------------------
logging:
  level:
    root: INFO
